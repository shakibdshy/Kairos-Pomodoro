name: Kairos-Pomodoro Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            arch: universal
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            arch: x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage
            arch: amd64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Build Kairos-Pomodoro
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --bundles ${{ matrix.bundle }}

      - name: Ad-hoc code sign (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          DMG_FILE=$(ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          echo "Found DMG at: ${DMG_FILE}"
          
          MOUNT_DIR="/tmp/kairos-dmg-mount"
          EXTRACT_DIR="src-tauri/target/release/bundle/macos-signed"
          
          hdiutil attach "${DMG_FILE}" -mountpoint "${MOUNT_DIR}" -nobrowse -quiet
          
          APP_PATH=$(find "${MOUNT_DIR}" -maxdepth 1 -name "*.app" -type d | head -1)
          echo "Found app at: ${APP_PATH}"
          
          mkdir -p "${EXTRACT_DIR}"
          cp -R "${APP_PATH}" "${EXTRACT_DIR}/"
          
          SIGNED_APP="${EXTRACT_DIR}/$(basename "${APP_PATH}")"
          codesign --force --deep --sign - "${SIGNED_APP}"
          codesign --verify --verbose "${SIGNED_APP}"
          echo "Ad-hoc signing complete"
          
          hdiutil detach "${MOUNT_DIR}" -quiet

      - name: Re-package signed DMG (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          EXTRACT_DIR="src-tauri/target/release/bundle/macos-signed"
          SIGNED_APP=$(find "${EXTRACT_DIR}" -name "*.app" -type d | head -1)
          APP_NAME=$(basename "${SIGNED_APP}" .app)
          DMG_STAGING="src-tauri/target/release/bundle/dmg/staging"
          DMG_OUTPUT="src-tauri/target/release/bundle/dmg/${APP_NAME}_aarch64_signed.dmg"
          
          rm -rf "${DMG_STAGING}"
          mkdir -p "${DMG_STAGING}"
          cp -R "${SIGNED_APP}" "${DMG_STAGING}/"
          ln -s /Applications "${DMG_STAGING}/Applications"
          
          hdiutil create -volname "${APP_NAME}" \
            -srcfolder "${DMG_STAGING}" \
            -ov -format UDZO "${DMG_OUTPUT}"
          
          echo "Signed DMG created at: ${DMG_OUTPUT}"
          ls -lh "${DMG_OUTPUT}"

      - name: List build outputs
        shell: bash
        run: |
          echo "=== DMG ===" && ls -la src-tauri/target/release/bundle/dmg/ 2>/dev/null || echo "No DMG"
          echo "=== EXE ===" && ls -la src-tauri/target/release/bundle/nsis/ 2>/dev/null || echo "No EXE"
          echo "=== AppImage ===" && ls -la src-tauri/target/release/bundle/appimage/ 2>/dev/null || echo "No AppImage"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kairos-Pomodoro-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/dmg/*_signed.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts into single directory
        run: |
          mkdir -p release-files
          find dist -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -lh release-files/

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="/tmp/release-notes.md"

          {
            echo "## Kairos-Pomodoro ${TAG}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            for f in release-files/*.{dmg,exe,AppImage}; do
              if [ -f "$f" ]; then
                filename=$(basename "$f")
                size=$(du -h "$f" | cut -f1)
                echo "| \`${filename}\` | ${size} |"
              fi
            done
            echo ""
            echo "---"
            echo ""
            echo "**MIT Licensed. Built with Tauri + React + TypeScript.**"
            echo ""
            echo "### macOS Users — First Launch"
            echo ""
            echo "If you see a security warning on first launch:"
            echo '```sh'
            echo "xattr -cr /Applications/Kairos-Pomodoro.app"
            echo '```'
            echo ""
            echo "Or right-click the app → **Open** (instead of double-clicking)."
            echo ""
            echo "### Verify Integrity"
            echo '```sh'
            echo "sha256sum *.dmg *.exe *.AppImage 2>/dev/null || true"
            echo '```'
          } > "${NOTES_FILE}"

          {
            echo "notes<<RELEASE_NOTES_EOF"
            cat "${NOTES_FILE}"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
