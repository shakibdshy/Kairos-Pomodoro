name: Kairos-Pomodoro Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            arch: universal
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            arch: x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage
            arch: amd64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Build Kairos-Pomodoro
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --bundles ${{ matrix.bundle }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kairos-Pomodoro-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "## Kairos-Pomodoro ${TAG}" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "### Downloads" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "| Platform | File |" >> "$GITHUB_OUTPUT"
          echo "|----------|------|" >> "$GITHUB_OUTPUT"
          for f in dist/*.{dmg,exe,AppImage,zip}; do
            if [ -f "$f" ]; then
              filename=$(basename "$f")
              size=$(du -h "$f" | cut -f1)
              echo "| ${filename} | ${size} |" >> "$GITHUB_OUTPUT"
            fi
          done
          echo "" >> "$GITHUB_OUTPUT"
          echo "---" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "**MIT Licensed. Built with Tauri + React + TypeScript.**" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "### Verify" >> "$GITHUB_OUTPUT"
          echo "\`\`\`sh" >> "$GITHUB_OUTPUT"
          echo "sha256sum ${TAG}/*.dmg ${TAG}/*.exe ${TAG}/*.AppImage 2>/dev/null || true" >> "$GITHUB_OUTPUT"
          echo "\`\`\`" >> "$GITHUB_OUTPUT"
          echo "EOF"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
