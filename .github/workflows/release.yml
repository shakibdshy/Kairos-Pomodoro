name: Kairos-Pomodoro Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

# Prevent concurrent release builds from racing on the same tag and clobbering
# each other's release assets / latest.json manifest.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      # tauri-action builds, signs with TAURI_SIGNING_PRIVATE_KEY, generates the
      # updater manifest (latest.json with a `platforms` map), and uploads all
      # artifacts to the GitHub release identified by tagName. Replaces the old
      # manual `tauri build` + ad-hoc macOS codesign/repack + broken upload
      # globs that never produced a manifest (root cause of the dead updater).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kairos-Pomodoro ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generateReleaseNotes: true
          # NSIS is the Windows updater bundle format (the app bundles nsis,
          # not msi). updaterJsonPreferNsis makes the manifest key the nsis URL.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # Guard: fail loudly if the updater manifest was not generated, so a
      # silent regression (the exact bug that shipped v1.2.0 with no manifest)
      # can never pass CI again. tauri-action writes latest.json to the runner
      # CWD and uploads it to the release; we assert it exists locally.
      - name: Verify updater manifest exists
        if: always()
        shell: bash
        run: |
          set +e
          if [ ! -f "latest.json" ]; then
            echo "::error::latest.json updater manifest was not generated — updater will be dead."
            echo "Build artifacts present:"
            find src-tauri/target/release/bundle -maxdepth 3 -type f 2>/dev/null | head -40
            exit 1
          fi
          echo "::notice::Updater manifest present"
          echo "=== latest.json ==="
          cat latest.json
