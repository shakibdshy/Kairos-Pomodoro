name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
projects: []
milestone: ""

body:
  - type: markdown
    id: description
    attributes:
      value: |
        ## Description
        Please describe the bug in detail. What happened and what did you expect to happen?
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: Tell us what you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: Tell us what actually happens
    validations:
      required: true
  - type: input
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem
      placeholder: Drag and drop or paste image here
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App Version
      description: What version of Kairos are you using?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem?
      placeholder: |
        - Device: [e.g. MacBook Pro 14"]
        - Browser: [if applicable]
        - Logs: [if applicable]
    validations:
      required: false